<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="200" y1="0" x2="600" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8A47"/>
      <stop offset="0.5" stop-color="#F45C8A"/>
      <stop offset="1" stop-color="#C23EE8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="179" fill="url(#bg)"/>
  <g transform="translate(400 400)">
    <!-- Single continuous fork path: left tine, curve down, up to center tine, curve down, up to right tine, curve to handle -->
    <path d="
      M-80 -210 L-80 0 C-80 70 -40 100 0 100
      M0 -210 L0 100
      M80 -210 L80 0 C80 70 40 100 0 100
      L0 250
    " stroke="#fff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
